<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-LINK // VPS VALUE CALCULATOR</title>
    <!-- 引入 Material Design 字体和图标 (借鉴) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style id="base-css">
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff003c;
            --cyber-yellow: #fcee0a;
            --dark-bg: #0d0d0d;
            --card-bg: rgba(20, 20, 20, 0.9);
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Roboto', 'Segoe UI', sans-serif;
            margin: 0;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            z-index: 2;
            position: relative;
        }
        .card {
            background: var(--card-bg);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            padding: 30px;
            border-radius: 4px;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--cyber-yellow);
            text-shadow: 2px 2px var(--neon-pink);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }
        
        .field { margin-bottom: 15px; }
        label { display: block; color: var(--neon-blue); font-size: 12px; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-left: 3px solid var(--neon-blue);
            color: white;
            padding: 12px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon-pink); }
        
        button {
            width: 100%;
            padding: 15px;
            background: var(--neon-pink);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }
        button:hover { background: var(--cyber-yellow); color: black; }

        .result-panel {
            margin-top: 30px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px dashed var(--neon-blue);
            padding: 20px;
            display: none;
        }
        .res-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
        .res-val { color: var(--cyber-yellow); font-weight: bold; }

        #aac-area { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        #aac-area.active { pointer-events: auto; }

        .admin-trigger { position: fixed; bottom: 10px; right: 20px; font-size: 10px; color: #333; cursor: pointer; z-index: 1000; }
        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 2px solid var(--neon-pink); padding: 30px; z-index: 1001; width: 90%; max-width: 500px; }
    </style>
</head>
<body>
    <div id="aac-area"></div>
    <div class="container">
        <div class="card">
            <h1><span class="material-symbols-outlined">memory</span> // VPS_VALUATION</h1>
            
            <div class="input-grid">
                <div class="field">
                    <label>Credit Amount (续费金额)</label>
                    <input type="number" id="price" placeholder="例如: 100">
                </div>
                <div class="field">
                    <label>Billing Cycle (付款周期)</label>
                    <select id="cycle">
                        <option value="30">MONTHLY / 月付</option>
                        <option value="90">QUARTERLY / 季付</option>
                        <option value="180">BI-ANNUALLY / 半年付</option>
                        <option value="365">YEARLY / 年付</option>
                        <option value="730">2-YEARS / 两年付</option>
                    </select>
                </div>
                <div class="field">
                    <label>Node Expiry (到期时间)</label>
                    <input type="date" id="expiry">
                </div>
                <div class="field">
                    <label>Trade Date (交易日期)</label>
                    <input type="date" id="trade">
                </div>
            </div>
            
            <button onclick="calc()">INITIALIZE CALCULATION</button>

            <div id="result" class="result-panel">
                <div class="res-row"><span>REMAINING_DAYS:</span><span class="res-val" id="res-days">-</span></div>
                <div class="res-row"><span>DAILY_COST:</span><span class="res-val" id="res-daily">-</span></div>
                <div class="res-row" style="font-size: 1.4em; border: none; margin-top: 10px;">
                    <span style="color:var(--neon-blue)">CORE_VALUE:</span>
                    <span class="res-val" id="res-total" style="color:var(--cyber-yellow)">-</span>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-trigger" onclick="openAdmin()">[SYSTEM_OVERRIDE]</div>

    <div id="admin-modal">
        <h3 style="color:var(--neon-pink)">ROOT AUTHENTICATION</h3>
        <div id="login-view">
            <input type="text" id="user" placeholder="USER" style="margin-bottom:10px">
            <input type="password" id="pass" placeholder="PASS" style="margin-bottom:10px">
            <button onclick="login()">ICEBREAKER</button>
        </div>
        <div id="dash-view" style="display:none">
            <label>AAC INJECTION (HTML/CSS/MD)</label>
            <textarea id="aac-input" rows="8" style="margin-bottom:10px"></textarea>
            <button onclick="saveAAC()">INJECT</button>
            <hr style="border-color:#222; margin:15px 0;">
            <label>UPDATE AUTH</label>
            <input type="text" id="n-user" placeholder="NEW USER" style="margin-bottom:5px">
            <input type="password" id="n-pass" placeholder="NEW PASS" style="margin-bottom:5px">
            <button onclick="upAuth()">SYNC AUTH</button>
        </div>
    </div>

    <script>
        document.getElementById('trade').valueAsDate = new Date();

        function calc() {
            const p = parseFloat(document.getElementById('price').value);
            const c = parseInt(document.getElementById('cycle').value);
            const e = new Date(document.getElementById('expiry').value);
            const t = new Date(document.getElementById('trade').value);

            if(!p || isNaN(e.getTime())) return alert("INVALID DATA");
            
            const diff = Math.ceil((e - t) / (1000 * 60 * 60 * 24));
            if(diff < 0) return alert("NODE EXPIRED");
            
            const daily = p / c;
            const total = daily * diff;

            document.getElementById('res-days').innerText = diff + " D";
            document.getElementById('res-daily').innerText = daily.toFixed(4);
            document.getElementById('res-total').innerText = total.toFixed(2) + " CREDITS";
            document.getElementById('result').style.display = 'block';
        }

        let auth = { user: '', pass: '' };
        function openAdmin() { document.getElementById('admin-modal').style.display = 'block'; }
        
        async function login() {
            auth.user = document.getElementById('user').value;
            auth.pass = document.getElementById('pass').value;
            const res = await fetch('/api/login', { method:'POST', body:JSON.stringify(auth) });
            if(res.ok) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('dash-view').style.display = 'block';
                document.getElementById('aac-input').value = localStorage.getItem('aac') || '';
            } else alert("DENIED");
        }

        function saveAAC() {
            const val = document.getElementById('aac-input').value;
            localStorage.setItem('aac', val);
            renderAAC(val);
        }

        async function upAuth() {
            const newUser = document.getElementById('n-user').value;
            const newPass = document.getElementById('n-pass').value;
            const res = await fetch('/api/update-auth', { 
                method:'POST', 
                body:JSON.stringify({ ...auth, newUser, newPass }) 
            });
            if(res.ok) { alert("SYNCED"); location.reload(); }
        }

        function renderAAC(content) {
            if(!content) return;
            const area = document.getElementById('aac-area');
            area.classList.add('active');
            if(content.includes('<')) area.innerHTML = content;
            else area.innerHTML = marked.parse(content);
            const styles = area.querySelectorAll('style');
            styles.forEach(s => document.head.appendChild(s.cloneNode(true)));
        }

        window.onload = () => renderAAC(localStorage.getItem('aac'));
    </script>
</body>
</html>
